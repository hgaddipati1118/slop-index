<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slop Index — live votes</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="robots" content="noindex">
<style>
  :root{
    --bg:#FBFAF9; --card:#FFFFFF; --surface:#F5F3F0; --ink:rgba(0,0,0,.9);
    --body:#565B64; --muted:rgba(0,0,0,.55); --faint:rgba(0,0,0,.4);
    --line:#E8E6E1; --divider:#ECEAE5; --dark:#191918; --heat:#C2673E; --good:#3F7A5B;
    --sans:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--sans);font-size:16px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px 60px}
  a{color:var(--ink);text-underline-offset:2px}
  header{padding:38px 0 6px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
  h1{font-size:clamp(24px,4vw,32px);margin:0;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
  .live{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 0 rgba(63,122,91,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,122,91,.45)}70%{box-shadow:0 0 0 7px rgba(63,122,91,0)}100%{box-shadow:0 0 0 0 rgba(63,122,91,0)}}
  .sub{font-family:var(--mono);font-size:12px;color:var(--faint);margin:2px 0 22px}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
  @media(max-width:640px){.cards{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 16px}
  .stat .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-size:30px;font-weight:700;color:var(--ink);margin-top:6px;font-variant-numeric:tabular-nums;line-height:1}
  .stat .d{font-size:12px;color:var(--muted);margin-top:5px}
  .stat.hi .v{color:var(--good)}
  .flash{animation:flash .9s ease-out}
  @keyframes flash{0%{background:rgba(63,122,91,.12)}100%{background:var(--card)}}

  .grid{display:grid;grid-template-columns:1.15fr 1fr;gap:16px;margin-top:20px;align-items:start}
  @media(max-width:680px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px 4px}
  .panel h2{font-size:12px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    font-weight:500;margin:0;padding:14px 16px 8px}
  .feed{max-height:640px;overflow-y:auto}
  .fl{flex:0 0 auto;width:20px;text-align:center;font-size:14px}
  .frow{display:flex;align-items:center;gap:9px;padding:9px 16px;border-top:1px solid var(--divider);font-size:13.5px}
  .frow:first-of-type{border-top:none}
  .frow.new{animation:flash 1.2s ease-out}
  .win{color:var(--ink);font-weight:600}
  .lose{color:var(--muted)}
  .beat{color:var(--faint);font-size:12px;margin:0 2px}
  .tie{color:var(--heat);font-weight:600}
  .ago{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  td{padding:8px 16px;border-top:1px solid var(--divider);color:var(--ink)}
  tr:first-child td{border-top:none}
  td.n{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums;color:var(--body)}
  .rank{font-family:var(--mono);color:var(--faint);width:26px}
  .rej{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.9}
  .rej b{color:var(--body)}
  footer{text-align:center;font-family:var(--mono);font-size:11px;color:var(--faint);padding:26px 0 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Live votes</h1>
    <div class="live"><span class="dot"></span><span id="upd">connecting…</span></div>
  </header>
  <div class="sub">Spot the Slop &middot; auto-refreshing &middot; <a href="/">play</a> &middot; <a href="/benchmark.html">the board</a></div>

  <div class="cards">
    <div class="stat"><div class="k">Total votes</div><div class="v" id="total">–</div><div class="d" id="totalDelta">since you opened: 0</div></div>
    <div class="stat"><div class="k">Decided</div><div class="v" id="decided">–</div><div class="d">one was sloppier</div></div>
    <div class="stat"><div class="k">Ties</div><div class="v" id="ties">–</div><div class="d">both are slop</div></div>
    <div class="stat hi"><div class="k">Last hour</div><div class="v" id="hour">–</div><div class="d">votes cast</div></div>
  </div>

  <div class="grid">
    <div class="panel">
      <h2>Live feed</h2>
      <div class="feed" id="feed"><div class="frow"><span class="lose">waiting for votes…</span></div></div>
    </div>
    <div class="panel">
      <h2>Standings</h2>
      <table><tbody id="board"><tr><td class="lose">loading…</td></tr></tbody></table>
    </div>
  </div>

  <div class="rej" id="rej"></div>

  <footer>a research toy from <a href="https://slashy.com">Slashy</a> &middot; open source on <a href="https://github.com/hgaddipati1118/slop-index" target="_blank" rel="noopener">GitHub</a></footer>
</div>

<script>
const NAMES={'claude-sonnet-5':'Sonnet 5','claude-opus-4-8':'Opus 4.8','claude-haiku-4-5':'Haiku 4.5',
  'claude-fable-5':'Fable 5','gpt-5.6-luna':'GPT-5.6 Luna','gpt-5.6-sol':'GPT-5.6 Sol','gpt-5.6-terra':'GPT-5.6 Terra',
  'gpt-5.4-mini':'GPT-5.4 Mini','gemini-3.1-pro-preview':'Gemini 3.1 Pro','gemini-3.5-flash':'Gemini 3.5 Flash',
  'grok-4.5':'Grok 4.5','kimi-k2p6':'Kimi K2.6','deepseek-v4-pro':'DeepSeek V4','glm-5.2':'GLM-5.2',
  'qwen3.7-max':'Qwen3.7 Max','minimax-m3':'MiniMax M3','mistral-large':'Mistral Large','muse-spark-1.1':'Muse Spark'};
const nm=m=>NAMES[m]||m;
const $=id=>document.getElementById(id);
let openTotal=null, lastSeenT=0;
// 2-letter ISO country code -> flag emoji
const flag=cc=>(cc&&cc.length===2&&/^[A-Z]{2}$/.test(cc))
  ? cc.replace(/./g,c=>String.fromCodePoint(127397+c.charCodeAt())) : '🌐';

function ago(t){const s=Math.max(0,Math.round((Date.now()-t)/1000));
  if(s<60)return s+'s ago'; const mn=Math.round(s/60); if(mn<60)return mn+'m ago';
  const h=Math.round(mn/60); return h+'h ago';}

function renderFeed(recent){
  if(!recent.length) return;
  $('feed').innerHTML=recent.map(v=>{
    const isNew=v.t>lastSeenT;
    const fl=`<span class="fl" title="${v.c||'unknown'}">${flag(v.c)}</span>`;
    if(v.o==='both') return `<div class="frow${isNew?' new':''}">${fl}<span class="tie">⚑ both slop</span>`+
      `<span class="beat">·</span><span class="lose">${nm(v.w)} & ${nm(v.l)}</span><span class="ago" data-t="${v.t}">${ago(v.t)}</span></div>`;
    return `<div class="frow${isNew?' new':''}">${fl}<span class="win">${nm(v.w)}</span>`+
      `<span class="beat">cleaner than</span><span class="lose">${nm(v.l)}</span><span class="ago" data-t="${v.t}">${ago(v.t)}</span></div>`;
  }).join('');
  lastSeenT=Math.max(lastSeenT,...recent.map(v=>v.t));
}

async function tick(){
  let d; try{ d=await fetch('/api/stats?cb='+Date.now()).then(r=>r.json()); }
  catch(e){ $('upd').textContent='reconnecting…'; return; }
  if(!d.store){ $('upd').textContent='no store'; return; }
  if(openTotal===null) openTotal=d.total;
  const prev=+($('total').dataset.v||d.total);
  $('total').textContent=d.total.toLocaleString(); $('total').dataset.v=d.total;
  if(d.total>prev){$('total').classList.remove('flash');void $('total').offsetWidth;$('total').classList.add('flash');}
  $('totalDelta').textContent='since you opened: +'+(d.total-openTotal);
  $('decided').textContent=d.decided.toLocaleString();
  $('ties').textContent=d.ties.toLocaleString();
  $('hour').textContent=(d.lastHour!=null?d.lastHour:'–');
  renderFeed(d.recent||[]);
  $('board').innerHTML=(d.models||[]).map((r,n)=>
    `<tr><td class="rank">${n+1}</td><td>${nm(r.model)}</td><td class="n">${r.elo}</td><td class="n">${r.games}</td></tr>`).join('')
    || '<tr><td class="lose">no votes yet</td></tr>';
  const rj=d.rejected||{};
  $('rej').innerHTML=`filtered (bot / too-fast / rate limits): `+
    `<b>${rj.too_fast||0}</b> too fast · <b>${rj.rate_limited||0}</b> rate · <b>${rj.daily_cap||0}</b> cap · `+
    `<b>${rj.no_session||0}</b> no-session · <b>${rj.bad_pair||0}</b> bad-pair`;
  $('upd').textContent='updated '+new Date().toLocaleTimeString();
}
// keep the "x ago" labels ticking without refetching
setInterval(()=>document.querySelectorAll('.ago').forEach(e=>e.textContent=ago(+e.dataset.t)),1000);
tick(); setInterval(tick, 7000);
</script>
</body>
</html>
